<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e2e2e2;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #aaa;
      letter-spacing: 1px;
    }

    #status.winner {
      color: #f0c040;
      font-weight: bold;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      background: #16213e;
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #0f3460;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-size: 3.5rem;
      font-weight: bold;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1a4a7a;
      transform: scale(1.04);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.p6 { color: #e94560; }
    .cell.p7 { color: #00b4d8; }

    .cell.win-cell {
      background: #1e3a5f;
      box-shadow: 0 0 18px rgba(240, 192, 64, 0.5);
    }

    .cell.win-cell.p6 { color: #f0c040; }
    .cell.win-cell.p7 { color: #f0c040; }

    @keyframes pop {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .cell.taken .num {
      display: inline-block;
      animation: pop 0.2s ease-out;
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: transparent;
      border: 2px solid #e94560;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #restart:hover {
      background: #e94560;
      color: #fff;
    }

    #legend {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: #888;
    }

    .legend-item { display: flex; align-items: center; gap: 0.5rem; }
    .legend-num { font-size: 1.3rem; font-weight: bold; }
    .legend-num.p6 { color: #e94560; }
    .legend-num.p7 { color: #00b4d8; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="legend">
    <div class="legend-item">
      <span class="legend-num p6">6</span>
      <span>Player 1</span>
    </div>
    <div class="legend-item">
      <span class="legend-num p7">7</span>
      <span>Player 2</span>
    </div>
  </div>

  <div id="status">Player 1's turn (6)</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 6;
    let gameOver = false;

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = parseInt(cell.dataset.index);
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.classList.add('taken', 'p' + current);
        const span = document.createElement('span');
        span.className = 'num';
        span.textContent = current;
        cell.appendChild(span);

        const winner = checkWinner();
        if (winner) {
          const playerNum = winner === 6 ? 1 : 2;
          status.textContent = `Player ${playerNum} (${winner}) wins!`;
          status.className = 'winner';
          gameOver = true;
        } else if (board.every(v => v)) {
          status.textContent = "It's a draw!";
          status.className = 'winner';
          gameOver = true;
        } else {
          current = current === 6 ? 7 : 6;
          const nextPlayer = current === 6 ? 1 : 2;
          status.textContent = `Player ${nextPlayer}'s turn (${current})`;
          status.className = '';
        }
      });
    });

    function checkWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          [a, b, c].forEach(i => cells[i].classList.add('win-cell'));
          return board[a];
        }
      }
      return null;
    }

    document.getElementById('restart').addEventListener('click', () => {
      board = Array(9).fill(null);
      current = 6;
      gameOver = false;
      status.textContent = "Player 1's turn (6)";
      status.className = '';
      cells.forEach(cell => {
        cell.className = 'cell';
        cell.innerHTML = '';
      });
    });
  </script>
</body>
</html>
